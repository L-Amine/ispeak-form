<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSpeak 2026 — Inscription</title>
<style>
  :root{
    --ink:#1b1410;
    --paper:#f7f2e9;
    --paper-2:#efe6d6;
    --rule:#d8cab0;
    --accent:#c0512f;
    --accent-2:#1f5b4f;
    --gold:#b9893a;
    --white:#fffaf0;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:Georgia, 'Times New Roman', serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:40px 18px 60px;
    background-image:
      radial-gradient(circle at 10% 10%, rgba(192,81,47,0.05), transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(31,91,79,0.06), transparent 40%);
  }

  .card{
    width:100%;
    max-width:560px;
    background:var(--white);
    border:1px solid var(--rule);
    box-shadow:0 1px 0 var(--rule), 0 18px 40px -20px rgba(27,20,16,0.35);
    position:relative;
  }

  .card::before{
    content:"";
    position:absolute;
    inset:10px;
    border:1px solid var(--rule);
    pointer-events:none;
  }

  .masthead{
    padding:38px 40px 24px;
    text-align:center;
    border-bottom:3px double var(--rule);
  }

  .eyebrow{
    font-family:'Trebuchet MS', sans-serif;
    letter-spacing:.22em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--accent-2);
    margin:0 0 10px;
  }

  h1{
    font-size:42px;
    margin:0;
    letter-spacing:.01em;
    font-weight:700;
  }

  h1 span{ color:var(--accent); }

  .tagline{
    font-style:italic;
    color:#5c5048;
    margin:10px 0 0;
    font-size:15px;
  }

  .org{
    margin-top:14px;
    font-family:'Trebuchet MS', sans-serif;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--gold);
  }

  form{ padding:34px 40px 12px; }

  .field{ margin-bottom:24px; }

  label{
    display:block;
    font-family:'Trebuchet MS', sans-serif;
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:#6b5d4f;
    margin-bottom:8px;
  }

  input[type="text"]{
    width:100%;
    padding:12px 4px;
    border:none;
    border-bottom:2px solid var(--rule);
    background:transparent;
    font-family:Georgia, serif;
    font-size:17px;
    color:var(--ink);
    transition:border-color .2s ease;
  }

  input[type="text"]:focus{
    outline:none;
    border-bottom-color:var(--accent);
  }

  input[type="text"]::placeholder{
    color:#b3a692;
    font-style:italic;
  }

  fieldset{ border:none; margin:0; padding:0; }

  .choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }

  .choices.lang{ grid-template-columns:1fr 1fr 1fr; }

  .choice{ position:relative; }

  .choice input{
    position:absolute;
    opacity:0;
    inset:0;
    cursor:pointer;
    margin:0;
  }

  .choice .box{
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    border:1.5px solid var(--rule);
    padding:14px 8px;
    font-family:'Trebuchet MS', sans-serif;
    font-size:14px;
    color:var(--ink);
    transition:all .15s ease;
    min-height:54px;
  }

  .choice input:checked + .box{
    border-color:var(--accent);
    background:#fbeee8;
    color:var(--accent);
    font-weight:700;
  }

  .choice input:focus-visible + .box{
    outline:2px solid var(--accent-2);
    outline-offset:2px;
  }

  .choice .box:hover{ border-color:var(--gold); }

  .submit-row{ margin-top:34px; text-align:center; }

  button{
    background:var(--accent-2);
    color:var(--white);
    border:none;
    font-family:'Trebuchet MS', sans-serif;
    letter-spacing:.12em;
    text-transform:uppercase;
    font-size:13px;
    padding:16px 38px;
    cursor:pointer;
    transition:background .2s ease, transform .1s ease;
  }

  button:hover{ background:#173f37; }
  button:active{ transform:scale(.98); }
  button:disabled{ opacity:.6; cursor:not-allowed; }

  .status{
    text-align:center;
    margin-top:18px;
    font-family:'Trebuchet MS', sans-serif;
    font-size:14px;
    min-height:20px;
  }

  .status.ok{ color:var(--accent-2); }
  .status.err{ color:var(--accent); }

  .footer{
    padding:18px 40px 30px;
    text-align:center;
    font-family:'Trebuchet MS', sans-serif;
    font-size:11px;
    color:#9c8f7e;
    letter-spacing:.05em;
  }

  @media (max-width:480px){
    .masthead{padding:30px 24px 20px;}
    h1{font-size:32px;}
    form{padding:26px 24px 8px;}
    .choices.lang{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="card">
  <div class="masthead">
    <p class="eyebrow">JCI Metouia · Club Juniors</p>
    <h1>i<span>Speak</span> 2026</h1>
    <p class="tagline">« Développe ta voix, défends tes idées »</p>
    <p class="org">Formulaire d'inscription</p>
  </div>

  <form id="ispeak-form">
    <div class="field">
      <label for="nom">Nom</label>
      <input type="text" id="nom" name="nom" placeholder="Votre nom" required autocomplete="family-name">
    </div>

    <div class="field">
      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required autocomplete="given-name">
    </div>

    <div class="field">
      <label>Choix de la compétition</label>
      <fieldset class="choices" id="competition-group">
        <label class="choice">
          <input type="radio" name="competition" value="Débat" required>
          <span class="box">Débat</span>
        </label>
        <label class="choice">
          <input type="radio" name="competition" value="Art Oratoire">
          <span class="box">Art Oratoire</span>
        </label>
      </fieldset>
    </div>

    <div class="field">
      <label>Langue</label>
      <fieldset class="choices lang" id="langue-group">
        <label class="choice">
          <input type="radio" name="langue" value="Français" required>
          <span class="box">Français</span>
        </label>
        <label class="choice">
          <input type="radio" name="langue" value="Anglais">
          <span class="box">Anglais</span>
        </label>
        <label class="choice">
          <input type="radio" name="langue" value="Arabe">
          <span class="box">Arabe</span>
        </label>
      </fieldset>
    </div>

    <div class="submit-row">
      <button type="submit" id="submit-btn">S'inscrire</button>
      <p class="status" id="status"></p>
    </div>
  </form>

  <div class="footer">JCI Metouia — Tous droits réservés</div>
</div>

<script>
const form = document.getElementById('ispeak-form');
const status = document.getElementById('status');
const btn = document.getElementById('submit-btn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  status.textContent = '';
  status.className = 'status';

  const data = {
    nom: form.nom.value.trim(),
    prenom: form.prenom.value.trim(),
    competition: form.competition.value,
    langue: form.langue.value
  };

  if(!data.nom || !data.prenom || !data.competition || !data.langue){
    status.textContent = "Merci de remplir tous les champs.";
    status.className = 'status err';
    return;
  }

  btn.disabled = true;
  btn.textContent = "Envoi en cours...";

  try{
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if(res.ok && result.ok){
      status.textContent = "Inscription confirmée. Merci " + data.prenom + " !";
      status.className = 'status ok';
      form.reset();
    } else {
      throw new Error(result.error || 'Erreur inconnue');
    }
  } catch(err){
    status.textContent = "Erreur d'envoi. Réessayez dans un instant.";
    status.className = 'status err';
  } finally {
    btn.disabled = false;
    btn.textContent = "S'inscrire";
  }
});
</script>

</body>
</html>
