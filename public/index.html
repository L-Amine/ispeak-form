<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSpeak 2026 — Inscription</title>
<style>
  :root{
    --blue:#003F87;
    --blue-dark:#002d61;
    --blue-light:#e8f0fb;
    --yellow:#FFD100;
    --yellow-dark:#e6bc00;
    --white:#ffffff;
    --gray:#f4f6fb;
    --text:#1a2340;
    --text-muted:#5a6a8a;
    --border:#d0daf0;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background:var(--gray);
    color:var(--text);
    font-family:'Segoe UI', Arial, sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px 16px 48px;
  }

  .card{
    width:100%;
    max-width:520px;
    background:var(--white);
    border-radius:16px;
    box-shadow:0 4px 32px rgba(0,63,135,0.13);
    overflow:hidden;
  }

  /* HEADER */
  .header{
    background:var(--blue);
    padding:36px 32px 28px;
    text-align:center;
    position:relative;
  }

  .header::after{
    content:"";
    display:block;
    height:5px;
    background:var(--yellow);
    position:absolute;
    bottom:0; left:0; right:0;
  }

  .org{
    color:var(--yellow);
    font-size:11px;
    font-weight:700;
    letter-spacing:.18em;
    text-transform:uppercase;
    margin-bottom:10px;
  }

  .logo-circle{
    width:64px;
    height:64px;
    background:var(--yellow);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 14px;
    font-size:22px;
    font-weight:900;
    color:var(--blue);
    letter-spacing:-.5px;
  }

  h1{
    color:var(--white);
    font-size:36px;
    font-weight:800;
    letter-spacing:.02em;
  }

  h1 span{
    color:var(--yellow);
  }

  .tagline{
    color:rgba(255,255,255,0.75);
    font-size:14px;
    margin-top:8px;
    font-style:italic;
  }

  /* FORM */
  form{
    padding:32px 32px 24px;
  }

  .field{
    margin-bottom:22px;
  }

  label.field-label{
    display:block;
    font-size:12px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--blue);
    margin-bottom:8px;
  }

  input[type="text"]{
    width:100%;
    padding:13px 16px;
    border:1.5px solid var(--border);
    border-radius:8px;
    background:var(--gray);
    font-size:16px;
    color:var(--text);
    transition:border-color .2s, box-shadow .2s;
    outline:none;
  }

  input[type="text"]:focus{
    border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(0,63,135,0.1);
    background:var(--white);
  }

  input[type="text"]::placeholder{
    color:#b0bcd4;
  }

  /* CHOICES */
  .choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .choices.lang{
    grid-template-columns:1fr 1fr 1fr;
  }

  .choice{
    position:relative;
  }

  .choice input{
    position:absolute;
    opacity:0;
    inset:0;
    cursor:pointer;
    margin:0;
  }

  .choice .box{
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    border:1.5px solid var(--border);
    border-radius:8px;
    padding:13px 8px;
    font-size:14px;
    font-weight:600;
    color:var(--text-muted);
    background:var(--gray);
    transition:all .15s ease;
    min-height:50px;
    cursor:pointer;
  }

  .choice input:checked + .box{
    border-color:var(--blue);
    background:var(--blue);
    color:var(--white);
    box-shadow:0 2px 8px rgba(0,63,135,0.25);
  }

  .choice .box:hover{
    border-color:var(--yellow-dark);
    background:var(--blue-light);
    color:var(--blue);
  }

  /* BUTTON */
  .submit-row{
    margin-top:28px;
    text-align:center;
  }

  button{
    width:100%;
    background:var(--yellow);
    color:var(--blue);
    border:none;
    border-radius:8px;
    font-size:15px;
    font-weight:800;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:16px 32px;
    cursor:pointer;
    transition:background .2s, transform .1s, box-shadow .2s;
    box-shadow:0 2px 12px rgba(255,209,0,0.35);
  }

  button:hover{
    background:var(--yellow-dark);
    box-shadow:0 4px 18px rgba(255,209,0,0.45);
  }

  button:active{
    transform:scale(.98);
  }

  button:disabled{
    opacity:.6;
    cursor:not-allowed;
  }

  /* STATUS */
  .status{
    text-align:center;
    margin-top:14px;
    font-size:14px;
    font-weight:600;
    min-height:20px;
    border-radius:8px;
    padding:0;
    transition:all .2s;
  }

  .status.ok{
    color:#1a7a3f;
    background:#e6f7ee;
    padding:12px;
  }

  .status.err{
    color:#b91c1c;
    background:#fef2f2;
    padding:12px;
  }

  /* FOOTER */
  .footer{
    background:var(--blue-light);
    border-top:1.5px solid var(--border);
    padding:14px 32px;
    text-align:center;
    font-size:11px;
    color:var(--text-muted);
    letter-spacing:.05em;
  }

  /* RESPONSIVE MOBILE */
  @media (max-width:480px){
    body{
      padding:0;
      justify-content:flex-start;
      background:var(--white);
    }

    .card{
      border-radius:0;
      box-shadow:none;
      min-height:100vh;
    }

    .header{
      padding:28px 20px 22px;
    }

    h1{
      font-size:28px;
    }

    .logo-circle{
      width:52px;
      height:52px;
      font-size:18px;
    }

    form{
      padding:24px 20px 16px;
    }

    .choices.lang{
      grid-template-columns:1fr 1fr 1fr;
    }

    .footer{
      padding:12px 20px;
    }
  }

  @media (max-width:340px){
    .choices.lang{
      grid-template-columns:1fr;
    }
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <p class="org">JCI Metouia · Club Juniors</p>
    <div class="logo-circle">iS</div>
    <h1>i<span>Speak</span> 2026</h1>
    <p class="tagline">« Développe ta voix, défends tes idées »</p>
  </div>

  <form id="ispeak-form">
    <div class="field">
      <label class="field-label" for="nom">Nom</label>
      <input type="text" id="nom" name="nom" placeholder="Votre nom" required autocomplete="family-name">
    </div>

    <div class="field">
      <label class="field-label" for="prenom">Prénom</label>
      <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required autocomplete="given-name">
    </div>

    <div class="field">
      <label class="field-label">Choix de la compétition</label>
      <div class="choices">
        <label class="choice">
          <input type="radio" name="competition" value="Débat" required>
          <span class="box">🎙️ Débat</span>
        </label>
        <label class="choice">
          <input type="radio" name="competition" value="Art Oratoire">
          <span class="box">🏆 Art Oratoire</span>
        </label>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Langue</label>
      <div class="choices lang">
        <label class="choice">
          <input type="radio" name="langue" value="Français" required>
          <span class="box">🇫🇷 Français</span>
        </label>
        <label class="choice">
          <input type="radio" name="langue" value="Anglais">
          <span class="box">🇬🇧 Anglais</span>
        </label>
        <label class="choice">
          <input type="radio" name="langue" value="Arabe">
          <span class="box">🇹🇳 Arabe</span>
        </label>
      </div>
    </div>

    <div class="submit-row">
      <button type="submit" id="submit-btn">S'inscrire</button>
      <p class="status" id="status"></p>
    </div>
  </form>

  <div class="footer">JCI Metouia — Tous droits réservés © 2026</div>
</div>

<script>
const form = document.getElementById('ispeak-form');
const status = document.getElementById('status');
const btn = document.getElementById('submit-btn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  status.textContent = '';
  status.className = 'status';

  const data = {
    nom: form.nom.value.trim(),
    prenom: form.prenom.value.trim(),
    competition: form.competition.value,
    langue: form.langue.value
  };

  if(!data.nom || !data.prenom || !data.competition || !data.langue){
    status.textContent = "Merci de remplir tous les champs.";
    status.className = 'status err';
    return;
  }

  btn.disabled = true;
  btn.textContent = "Envoi en cours...";

  try{
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if(res.ok && result.ok){
      status.textContent = "✅ Inscription confirmée. Merci " + data.prenom + " !";
      status.className = 'status ok';
      form.reset();
    } else {
      throw new Error(result.error || 'Erreur inconnue');
    }
  } catch(err){
    status.textContent = "❌ Erreur d'envoi. Réessayez dans un instant.";
    status.className = 'status err';
  } finally {
    btn.disabled = false;
    btn.textContent = "S'inscrire";
  }
});
</script>

</body>
</html>
